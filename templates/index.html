<!DOCTYPE html>
<html>
<head>
    <title>Instagram Scheduler</title>
</head>
<body>

    <h1>Instagram Video Scheduler</h1>

    <form action="/upload" method="post" enctype="multipart/form-data">

        <input type="file" name="video" required>
        <br><br>

        <textarea name="caption" placeholder="Caption"></textarea>
        <br><br>

        <input type="datetime-local" name="upload_time" required>
        <br><br>

        <button type="submit">Schedule Video</button>

    </form>

</body>
</html>
