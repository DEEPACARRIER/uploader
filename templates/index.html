<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploader - Schedule Your Videos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#020617,#111827);
            padding:20px;
        }

        .container{
            width:100%;
            max-width:650px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:25px;
            padding:40px;
            box-shadow:0 20px 50px rgba(0,0,0,.5);
        }

        .logo{
            text-align:center;
            margin-bottom:30px;
        }

        .logo h1{
            color:white;
            font-size:38px;
            margin-bottom:10px;
        }

        .logo p{
            color:#94a3b8;
            font-size:15px;
        }

        .upload-box{
            border:2px dashed #6366f1;
            border-radius:20px;
            padding:35px;
            text-align:center;
            margin-bottom:25px;
            transition:.3s;
        }

        .upload-box:hover{
            border-color:#8b5cf6;
            transform:scale(1.02);
        }

        .upload-box input{
            color:white;
            width:100%;
        }

        label{
            color:#cbd5e1;
            font-size:14px;
            display:block;
            margin-bottom:8px;
            margin-top:20px;
        }

        textarea,
        input[type="datetime-local"]{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            border-radius:15px;
            background:rgba(255,255,255,.08);
            color:white;
            font-size:15px;
        }

        textarea{
            resize:none;
            height:130px;
        }

        textarea::placeholder{
            color:#94a3b8;
        }

        .platforms{
            display:flex;
            gap:15px;
            margin-top:20px;
        }

        .platform{
            flex:1;
            padding:15px;
            border-radius:15px;
            background:rgba(255,255,255,.08);
            text-align:center;
            color:white;
            cursor:pointer;
            border:1px solid rgba(255,255,255,.1);
        }

        .platform:hover{
            background:#4f46e5;
        }

        button{
            width:100%;
            margin-top:30px;
            padding:18px;
            border:none;
            border-radius:15px;
            font-size:18px;
            font-weight:600;
            color:white;
            cursor:pointer;
            background:linear-gradient(135deg,#6366f1,#8b5cf6);
            transition:.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 30px rgba(99,102,241,.4);
        }

        .footer{
            text-align:center;
            margin-top:25px;
            color:#94a3b8;
            font-size:13px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>🚀 Uploader</h1>
        <p>Schedule your videos and publish automatically</p>
    </div>

    <form action="/upload" method="post" enctype="multipart/form-data">

        <div class="upload-box">
            <h3 style="color:white;margin-bottom:15px;">📹 Upload Video</h3>
            <input type="file" name="video" required>
        </div>

        <label>Caption & Hashtags</label>
        <textarea name="caption"
                  placeholder="Write your caption here... #viral #fyp #trending"></textarea>

        <label>Schedule Date & Time</label>
        <input type="datetime-local" name="upload_time" required>

        <label>Select Platform</label>

        <div class="platforms">
            <div class="platform">📸 Instagram</div>
            <div class="platform">🎵 TikTok</div>
        </div>

        <button type="submit">
            Schedule Video
        </button>

    </form>

    <div class="footer">
        Uploader © 2026 • Social Media Automation Platform
    </div>

</div>

</body>
</html>
